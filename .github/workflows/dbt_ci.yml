name: dbt_CI

on:
  pull_request:
    branches: [main]

jobs:
  ci_run:
    runs-on: ubuntu-latest
    env:
      # Using the EXACT names the Snowflake CLI expects for the "default" connection
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }} # No file needed!
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: "tasty_bytes_dbt_db"
      SNOWFLAKE_SCHEMA: "PUBLIC"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v1 # Official Action
        with:
          cli-version: "latest"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Install dbt Dependencies
        run: |
          cd tasty_bytes_dbt_demo
          dbt deps

      - name: Deploy Project
        # No extra flags needed! It uses the env vars above automatically.
        run: |
          snow dbt deploy tasty_bytes \
            --source tasty_bytes_dbt_demo \
            --profiles-dir tasty_bytes_dbt_demo \
            --force

      - name: Execute Slim CI (Build Modified)
        # Testing the specific models changed in the PR
        run: |
          snow dbt execute tasty_bytes build --select state:modified+
