name: dbt_CI

on:
  pull_request:
    branches: [main]

jobs:
  ci_run:
    runs-on: ubuntu-latest
    # We define these as env vars to keep the 'run' commands clean
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: "tasty_bytes_dbt_db"
      SNOWFLAKE_SCHEMA: "PUBLIC"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python and Snowflake CLI
        run: |
          pip install snowflake-cli-labs dbt-snowflake

      - name: Create Private Key File
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > snowflake_key.p8
          chmod 600 snowflake_key.p8

      - name: Install dbt Dependencies (Local)
        run: |
          cd tasty_bytes_dbt_demo
          dbt deps

      - name: Deploy Project to Snowflake Stage
        run: |
          snow dbt deploy tasty_bytes \
            --source tasty_bytes_dbt_demo \
            --profiles-dir tasty_bytes_dbt_demo \
            --temporary-connection \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --private-key-file "snowflake_key.p8" \
            --authenticator "SNOWFLAKE_JWT" \
            --role "$SNOWFLAKE_ROLE" \
            --warehouse "$SNOWFLAKE_WAREHOUSE" \
            --database "$SNOWFLAKE_DATABASE" \
            --schema "$SNOWFLAKE_SCHEMA" \
            --force

      - name: Execute Slim CI (Build Modified Models)
        run: |
          # We use the unquoted syntax for 'build' and '--select'
          # This tells Snowflake to run only the changed models
          snow dbt execute tasty_bytes build \
            --select state:modified+ \
            --temporary-connection \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --private-key-file "snowflake_key.p8" \
            --authenticator "SNOWFLAKE_JWT" \
            --role "$SNOWFLAKE_ROLE" \
            --warehouse "$SNOWFLAKE_WAREHOUSE" \
            --database "$SNOWFLAKE_DATABASE" \
            --schema "$SNOWFLAKE_SCHEMA"
