name: dbt_CI

on:
  pull_request:
    branches: [main]

jobs:
  ci_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python and Snowflake CLI
        run: |
          pip install snowflake-cli-labs dbt-snowflake

      - name: Run dbt CI
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        
        run: |
          # 1. Create the key file
          echo "$SNOWFLAKE_PRIVATE_KEY" > snowflake_key.p8
          chmod 600 snowflake_key.p8

          # 2. INSTALL PACKAGES LOCALLY FIRST
          # This creates the 'dbt_packages' folder that Snowflake is looking for
          cd tasty_bytes_dbt_demo
          dbt deps
          cd ..

          # 3. Native Snowflake dbt Deploy
          # Now 'dbt_packages' will be included in the upload
          snow dbt deploy tasty_bytes \
            --source tasty_bytes_dbt_demo \
            --profiles-dir tasty_bytes_dbt_demo \
            --default-target dev \
            --temporary-connection \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --private-key-file "snowflake_key.p8" \
            --authenticator "SNOWFLAKE_JWT" \
            --role "$SNOWFLAKE_ROLE" \
            --warehouse "$SNOWFLAKE_WAREHOUSE" \
            --database "tasty_bytes_dbt_db" \
            --schema "PUBLIC" \
            --force
